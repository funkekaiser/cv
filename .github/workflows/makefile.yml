# .github/workflows/build-cv.yml
name: Build and deploy CV

on:
  push:
    branches: [main]
    paths:
      - 'cv.tex'
      - 'Makefile'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: false

      - name: Commit PDF to this repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cv.pdf
          git diff --cached --quiet || git commit -m "Build cv.pdf"
          git push

      - name: Push to website repo
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.CV_DEPLOY_TOKEN }}
        with:
          source_file: cv.pdf
          destination_repo: funkekaiser/funkekaiser-website
          destination_branch: main
          user_email: jonathan@funkekaiser.com
          user_name: Jonathan Funke-Kaiser
          commit_message: "Update CV"
